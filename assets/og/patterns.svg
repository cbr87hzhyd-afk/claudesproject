  <text x="92" y="290" font-family="Cormorant Garamond, Georgia, serif"
        font-weight="300" font-size="160" fill="#e6e1d9" letter-spacing="-3">
    <tspan x="92" y="290">Patterns</tspan>
  </text>

  <!-- footer brand -->
